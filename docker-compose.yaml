# nginx proxy address - http://172.17.0.1:5984

name: couchdb
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: couchdb:latest
    container_name: couchdb-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      COUCHDB_USER: ${DB_ADMIN_NAME:-admin}
      COUCHDB_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    ports:
      - '172.17.0.1:5984:5984'
    volumes:
      - './volumes/data/db/couchdb/couchdb:/opt/couchdb/data'
      - './volumes/data/log/couchdb:/opt/couchdb/var/log'
      - './volumes/config/couchdb:/opt/couchdb/etc/local.d'
    extra_hosts:
      - 'localhost:172.17.0.1'
      - 'couchdb:host-gateway'
      - 'host.docker.internal:host-gateway'
    networks:
      - couchdb

networks:
  couchdb:
    name: couchdb
    external: false
